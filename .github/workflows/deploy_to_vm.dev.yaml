name: 4. Deploy Dev to VM
run-name: ${{ github.actor }} is deploying to VM - Dev  🚀
on:
  workflow_dispatch:
    branches: [ dev ]
     
  workflow_run:
      workflows: ["3. Push Image To Docker Hub in Dev"] # Run the deploy after successful Build and Test
      types:
        - completed    
     
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy_to_vm:
    runs-on: ubuntu-latest
    environment: DEV
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v4


    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: "${{ secrets.GCP_SVC_ACCOUNT_KEY }}"
      
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ vars.GCP_PROJECT_ID }}
      
    # - name: Set up gcloud beta
    #   run: gcloud components install beta

    - name: Configure Docker to use gcloud as a credential helper
      run: |
        gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev


    - name: Cleanup containers on VM
      run:  |
        gcloud compute ssh ${{ vars.GCP_VM_NAME }} \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet \
          --command "cd ~/fansboda && 
          docker system prune -a --volumes -f && 
          docker container prune -f"  


    - name: Create fansboda directory on VM
      run: |
        gcloud compute ssh ${{ vars.GCP_VM_NAME }} \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet \
          --command "mkdir -p ~/fansboda ~/fansboda/certbot-webroot ~/fansboda/certificates"


    - name: Upload Docker Compose to Compute Engine Instance
      run: |
        gcloud compute scp docker-compose.dev.yml nginx.conf nginx-acme.conf ${{ vars.GCP_VM_NAME }}:~/fansboda/ \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet

        gcloud compute scp --recurse static ${{ vars.GCP_VM_NAME }}:~/fansboda/ \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet

        # gcloud compute scp --recurse certificates ${{ vars.GCP_VM_NAME }}:~/fansboda/ --zone=us-central1-a 2>/dev/null || true
    
    - name: Create .env locally
      run:  |
        cat > .env <<EOF
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        ALLOWED_EMAILS=${{ secrets.ALLOWED_EMAILS }}
        GOOGLE_APPLICATION_CREDENTIALS=/fansboda/secrets/GCP_SVC_ACCOUNT_KEY.json
        GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }}
        GOOGLE_CLOUD_REGION=${{ vars.GCP_REGION }}
        GMAIL_SENDER_EMAIL=${{ secrets.GMAIL_SENDER_EMAIL }}
        TELECOM_EMAIL=${{ secrets.TELECOM_EMAIL }}
        JOHAN_AND_EMIL_BILSERVICE_EMAIL=${{ secrets.JOHAN_AND_EMIL_BILSERVICE_EMAIL }}
        JA_BILSERVICE_EMAIL=${{ secrets.JA_BILSERVICE_EMAIL }}
        TK_MATSERVICE_EMAIL=${{ secrets.TK_MATSERVICE_EMAIL }}
        FLASK_ENV=${{ vars.FLASK_ENV }}
        EOF


    - name: Copy .env to VM
      run:  |
        gcloud compute scp .env ${{ vars.GCP_VM_NAME }}:~/fansboda/.env \
        --zone=us-central1-a \
        --project=${{ vars.GCP_PROJECT_ID }} \
        --tunnel-through-iap \
        --quiet


    - name: Upload service account keys
      run: |
        # Encode the secret to base64
        ENCODED_GCP_KEY=$(echo -n '${{ secrets.GCP_SVC_ACCOUNT_KEY }}' | base64 -w 0)
        ENCODED_GMAIL_KEY=$(echo -n '${{ secrets.GMAIL_SENDER_SA_KEY }}' | base64 -w 0)

        gcloud compute ssh ${{ vars.GCP_VM_NAME }} \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet \
          --command "cd ~/fansboda && 
          mkdir -p secrets &&
          sudo chmod 700 secrets &&
          echo '$ENCODED_GCP_KEY' | base64 -d > secrets/GCP_SVC_ACCOUNT_KEY.json &&
          sudo chmod 600 secrets/GCP_SVC_ACCOUNT_KEY.json &&
          echo '$ENCODED_GMAIL_KEY' | base64 -d > secrets/GMAIL_SENDER_SA_KEY.json &&
          sudo chmod 600 secrets/GMAIL_SENDER_SA_KEY.json"
 


    - name: Configure Docker Hub authentication on VM
      run: |
        gcloud compute ssh ${{ vars.GCP_VM_NAME }} \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet \
          --command "echo '${{ secrets.DOCKER_TOKEN }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin"


    - name: Pull and Run Docker image to Compute Engine Instance
      run: |
        gcloud compute ssh ${{ vars.GCP_VM_NAME }} \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet \
          --command "cd ~/fansboda && 
          docker compose -f docker-compose.dev.yml down && 
          docker compose -f docker-compose.dev.yml pull &&
          docker compose -f docker-compose.dev.yml run --rm web flask db upgrade && 
          docker compose -f docker-compose.dev.yml up -d"


    - name: Check web container logs
      run: |
        gcloud compute ssh ${{ vars.GCP_VM_NAME }} \
          --zone=us-central1-a \
          --project=${{ vars.GCP_PROJECT_ID }} \
          --tunnel-through-iap \
          --quiet \
          --command "cd ~/fansboda && docker logs fansboda-web 2>&1 | tail -50"
    


        
 
    

